<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Notification - GMAXEPAY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #fafbfc;
            padding: 20px;
            line-height: 1.6;
        }
        .email-wrapper {
            max-width: 750px;
            margin: 0 auto;
        }
        .email-container {
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }
        .header {
            background-color: #ffffff;
            padding: 30px 20px 20px;
            text-align: right;
        }
        .logo-container {
            display: inline-block;
        }
        .logo-container img {
            width: 80px;
            height: 80px;
            display: block;
            object-fit: contain;
        }
        .content {
            padding: 25px 20px 30px;
            text-align: center;
        }
        .illustration {
            margin: 0 auto 30px;
            max-width: 280px;
        }
        .illustration img {
            width: 90%;
            max-width: 90%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .greeting {
            font-size: 32px;
            font-weight: 400;
            color: #4a4a4a;
            margin-bottom: 20px;
            text-align: center;
        }
        .success-message {
            font-size: 20px;
            font-weight: 500;
            color: #5B8DEE;
            margin-bottom: 30px;
            text-align: center;
        }
        .message {
            font-size: 16px;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 25px;
            text-align: center;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
        .footer {
            background-color: #f9f9f9;
            padding: 25px 20px;
            text-align: center;
            border-top: 1px solid #eeeeee;
        }
        .footer p {
            font-size: 13px;
            color: #999999;
            margin: 5px 0;
            line-height: 1.5;
        }
        @media only screen and (max-width: 750px) {
            body {
                padding: 10px;
            }
            .content {
                padding: 20px 15px 25px;
            }
            .greeting {
                font-size: 26px;
            }
            .success-message {
                font-size: 18px;
            }
            .message {
                font-size: 15px;
            }
            .illustration {
                max-width: 240px;
            }
            .illustration img {
                width: 90%;
                max-width: 90%;
            }
            .logo-container img {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-container">
            <div class="header">
                <div class="logo-container">
                    <img src="{{LOGO_URL}}" alt="GMAXEPAY Logo" />
                </div>
            </div>
            <div class="content">
                <div class="illustration">
                    <img src="{{ILLUSTRATION_URL}}" alt="Notification Illustration" />
                </div>
                <div class="greeting">Dear {{USER_NAME}},</div>
                <div class="success-message">{{SUCCESS_MESSAGE}}</div>
                <div class="message">
                    {{MESSAGE}}
                </div>
            </div>
            <div class="footer">
                <p>&copy; {{YEAR}} GMAXEPAY. All rights reserved.</p>
                <p>08062179126, 8088651844 | support@gmaxepay.com</p>
                <p>This is an automated email. Please do not reply to this message.</p>
            </div>
        </div>
    </div>
</body>
</html>
