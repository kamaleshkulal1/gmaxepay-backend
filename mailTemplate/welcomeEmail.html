<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to GMAXEPAY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff; /* increase white background */
            padding: 20px;
            line-height: 1.6;
        }
        .email-wrapper {
            max-width: 600px;
            margin: 0 auto;
        }
        .email-container {
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .header {
            background-color: #ffffff;
            padding: 30px 20px 20px;
            text-align: right;
        }
        .logo-container {
            display: inline-block;
        }
        .logo-container img {
            width: 32px;
            height: 32px;
            display: block;
            object-fit: contain;
        }
        .content {
            padding: 40px 35px 50px;
            text-align: center;
        }
        .illustration {
            margin: 0 auto 40px;
            max-width: 320px;
        }
        .illustration img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .greeting {
            font-size: 32px;
            font-weight: 400;
            color: #4a4a4a;
            margin-bottom: 30px;
            text-align: center;
        }
        .message {
            font-size: 16px;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 35px;
            text-align: center;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
        .cta-container {
            text-align: center;
            margin: 40px 0;
        }
        .cta-button {
            display: inline-block;
            padding: 14px 50px;
            background-color: #5B8DEE;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(91, 141, 238, 0.3);
            transition: all 0.3s ease;
        }
        .cta-button:hover {
            background-color: #4a7dd9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(91, 141, 238, 0.4);
        }
        .footer {
            background-color: #ffffff;
            padding: 25px 20px;
            text-align: center;
            border-top: 1px solid #eeeeee;
        }
        .footer p {
            font-size: 13px;
            color: #999999;
            margin: 5px 0;
            line-height: 1.5;
        }
        @media only screen and (max-width: 600px) {
            body {
                padding: 10px;
            }
            .content {
                padding: 30px 25px 40px;
            }
            .greeting {
                font-size: 26px;
            }
            .message {
                font-size: 15px;
            }
            .illustration {
                max-width: 280px;
            }
            .logo-container img {
                width: 64px;
                height: 64px;
            }
            .cta-button {
                padding: 12px 40px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-container">
            <div class="header">
                <div class="logo-container">
                    <img src="{{LOGO_URL}}" alt="GMAXEPAY Logo" />
                </div>
            </div>
            <div class="content">
                <div class="illustration">
                    <img src="{{ILLUSTRATION_URL}}" alt="Onboarding Illustration" />
                </div>
                <div class="greeting">Dear {{USER_NAME}},</div>
                <div class="message">
                    Click on Go Through Link button & Complete Onboarding Process to activate your account.
                </div>
                <div class="cta-container">
                    <a href="{{ONBOARDING_LINK}}" class="cta-button">Go Through Link</a>
                </div>
            </div>
            <div class="footer">
                <p>&copy; {{YEAR}} GMAXEPAY. All rights reserved.</p>
                <p>This is an automated email. Please do not reply to this message.</p>
                <p>Customer Support: <a href="mailto:support@gmaxepay.com">support@gmaxepay.com</a></p>
            </div>
        </div>
    </div>
</body>
</html>
