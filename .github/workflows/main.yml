    - name: ✅ Verify ECR Image Push
      run: |
        echo "✅ Docker image successfully pushed to ECR"
        echo "📦 Image: ${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com/${{ secrets.ECR_NAME }}:dev"
        echo "📦 Tagged: ${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com/${{ secrets.ECR_NAME }}:${{ github.sha }}"
        echo "🚀 Auto Scaling Group will automatically pull and deploy the new image"
          
    - name: ✅ Notify Slack - Success
      uses: 8398a7/action-slack@v3
      if: success()
      with:
        status: success
        custom_payload: |
          {
            "text": "🎉 Deployment Successful",
            "attachments": [{
              "color": "good",
              "fields": [
                {"title": "Branch", "value": "${{ steps.commit.outputs.branch }}", "short": true},
                {"title": "Author", "value": "${{ steps.commit.outputs.author }} <${{ steps.commit.outputs.author_email }}>", "short": true},
                {"title": "Commit", "value": "${{ steps.commit.outputs.sha }}", "short": true},
                {"title": "Time", "value": "${{ steps.commit.outputs.time }}", "short": true},
                {"title": "ECR Image", "value": "${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com/${{ secrets.ECR_NAME }}:dev", "short": false}
                {"title": "Note", "value": "Auto Scaling Group will deploy automatically", "short": false}
              ]
            }]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: 🏥 Health Check Failure Notification
