name: 🚀 Gmaxepay Deployment

on:
  push:
    branches: [dev]

jobs:     
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
      
    - name: 📋 Get commit info
      id: commit
      run: |
        echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
        echo "author_email=${{ github.event.head_commit.author.email }}" >> $GITHUB_OUTPUT
        echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        echo "time=$(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
        
        # Handle commit message with proper escaping for multi-line
        {
          echo 'message<<EOF'
          echo '${{ github.event.head_commit.message }}'
          echo 'EOF'
        } >> $GITHUB_OUTPUT
        
        # Handle author name with proper escaping
        {
          echo 'author<<EOF'
          echo '${{ github.event.head_commit.author.name }}'
          echo 'EOF'
        } >> $GITHUB_OUTPUT
        
    - name: 📢 Notify Slack - Started
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        custom_payload: |
          {
            "text": "🚀 Deployment Started",
            "attachments": [{
              "color": "good",
              "fields": [
                {"title": "Branch", "value": "${{ steps.commit.outputs.branch }}", "short": true},
                {"title": "Author", "value": "${{ steps.commit.outputs.author }} <${{ steps.commit.outputs.author_email }}>", "short": true},
                {"title": "Commit", "value": "${{ steps.commit.outputs.sha }}", "short": true},
                {"title": "Time", "value": "${{ steps.commit.outputs.time }}", "short": true}
              ]
            }]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: network=host

    - name: 🔐 Configure AWS credentials for ECR (ASG)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ASG_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_ASG_SECRET_ACCESS_KEY }}
        aws-region: ap-south-2

    - name: 🔑 Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: 💾 Docker layer caching
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: 🏗️ Build and push Docker image to ECR
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com/${{ secrets.ECR_NAME }}:dev
          ${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com/${{ secrets.ECR_NAME }}:${{ github.sha }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

